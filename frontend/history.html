<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Історія чатів</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="chat.html">Створити чат</a>
      <a href="index.html">Головна</a>
    <a href="index.html" class="login-btn-top">Вийти</a>
  </header>

  <main class="history-container">
    <div class="history-header">
      <img src="./avatar1.png" alt="Аватар користувача">
      <h2>Історія чатів</h2>
    </div>

    <ul class="chat-list" id="chatList">
      <!-- Приклад чату:
      <li class="chat-item">
        <div>Допомога з тестом</div>
        <div class="chat-time">3 години тому</div>
      </li>
      -->
    </ul>

    <div class="empty-message" id="emptyMessage">
      тут поки, що порожньо
    </div>
  </main>

  <script>
    const chats = []; // Замінити на реальні дані з API або localStorage
    const chatList = document.getElementById('chatList');
    const emptyMessage = document.getElementById('emptyMessage');

    if (chats.length === 0) {
      emptyMessage.style.display = 'block';
    } else {
      emptyMessage.style.display = 'none';
      chats.forEach(chat => {
        const li = document.createElement('li');
        li.className = 'chat-item';
        li.innerHTML = `
          <div>${chat.title}</div>
          <div class="chat-time">${chat.time}</div>
        `;
        chatList.appendChild(li);
      });
    }
  </script>
</body>
</html>
