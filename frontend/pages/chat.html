<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Чат з помічником</title>
    <link rel="stylesheet" href="/static/css/chat.css" />
  </head>
  <body>
    <!-- Верхнє меню -->
    <header class="top-nav">
      <nav class="menu-bar">
        <ul>
          <li><a href="/">Головна</a></li>
          <li><a href="/history">Історія чатів</a></li>
          <button id="new-chat-btn" class="create-chat-btn">
            ➕ Створити новий чат
          </button>
        </ul>
      </nav>
      <a href="/" class="logout-btn">Вийти</a>
    </header>

    <!-- Основна частина -->
    <main class="chat-container">
      <!-- Ліва панель -->
      <!-- <aside class="left-panel">
        <video
          autoplay
          loop
          muted
          playsinline
          class="avatar-video"
          id="emotion-video"
          style="
            width: 300px;
            height: auto;
            object-fit: contain;
            border-radius: 15px;
          "
        >
          <source src="/avatar/animations/squinted1.mp4" type="video/mp4" />
        </video>
        <div class="assistant-message">
          <p id="assistant-text">Привіт! Чим можу допомогти?</p>
        </div>
      </aside> -->
      <!-- Ліва панель з 3D-моделлю -->
      <aside class="left-panel">
        <div
          id="model-container"
          style="
            width: 300px;
            height: 300px;
            border-radius: 15px;
            overflow: hidden;
          "
        ></div>
        <div class="assistant-message">
          <p id="assistant-text">Привіт! Чим можу допомогти?</p>
        </div>
      </aside>

      <!-- Права панель -->
      <section class="right-panel">
        <div class="chat-window">
          <!-- Повідомлення чату -->
          <div class="chat-message assistant">Привіт! Чим можу допомогти?</div>
          <!-- Тут буде більше повідомлень динамічно -->
        </div>

        <!-- Введення повідомлення -->
        <div class="chat-input">
          <textarea
            id="user-input"
            placeholder="Введіть повідомлення..."
          ></textarea>
          <button id="voice-btn">🎤</button>
          <button id="send-btn">📩</button>
        </div>
      </section>
    </main>
    <script src="/static/js/chat.js"></script>

    <script>
      // Очистити localStorage при натисканні на кнопку "Вийти"
      document
        .querySelector(".logout-btn")
        ?.addEventListener("click", function (e) {
          // Очистити локальне сховище
          localStorage.clear();
          sessionStorage.clear(); // Якщо використовувалось
          // За потреби: показати повідомлення або логування
          console.log("Дані з локального сховища видалено");
        });
    </script>
    <!-- Three.js + GLTFLoader як ES Module -->
    <script type="module">
      import * as THREE from "/static/js/three/build/three.module.js";
      import { GLTFLoader } from "/static/js/three/examples/jsm/loaders/GLTFLoader.js";
      import { OrbitControls } from "/static/js/three/examples/jsm/controls/OrbitControls.js";

      const container = document.getElementById("model-container");

      // Сцена, камера, рендерер
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xeeeeee);
      const camera = new THREE.PerspectiveCamera(
        75,
        container.clientWidth / container.clientHeight,
        0.1,
        1000
      );
      camera.position.z = 3;
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      // Світло
      const light = new THREE.AmbientLight(0xffffff, 1);
      scene.add(light);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight.position.set(0, 1, 1);
      scene.add(directionalLight);

      // Змінні для моделі та анімації
      let mixer;
      const clock = new THREE.Clock();

      // Завантаження моделі
      const loader = new GLTFLoader();
      loader.load(
        "../../../avatar/roxanaanim.glb",
        function (gltf) {
          scene.add(gltf.scene);

          // Налаштування анімації
          mixer = new THREE.AnimationMixer(gltf.scene);
          const clips = gltf.animations;
          if (clips && clips.length) {
            const clip = clips[0];
            const action = mixer.clipAction(clip);
            action.play();
          }
        },
        undefined,
        function (error) {
          console.error(error);
        }
      );

      // Контроли
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // Анімація
      function animate() {
        requestAnimationFrame(animate);

        // Оновлення анімації
        if (mixer) {
          const delta = clock.getDelta();
          mixer.update(delta);
        }

        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
