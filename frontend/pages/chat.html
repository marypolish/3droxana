<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат | KPI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2 text-white">
            <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
            <span class="fw-bold">KPI Helper</span>
        </div>
    </div>

    <div class="px-3">
        <button id="new-chat-btn" class="btn btn-new-chat w-100 text-start btn-sm mb-3 text-white">
            <i class="bi bi-plus-lg me-2"></i> Новий чат
        </button>

        <small class="text-uppercase text-secondary fw-bold mb-2 d-block" style="font-size: 0.7rem;">Навігація</small>
        <div class="d-flex flex-column">
            <a href="/" class="nav-link-custom"><i class="bi bi-house"></i> <span>Головна</span></a>
            <a href="/chat" class="nav-link-custom active"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>

    <div class="mt-auto p-3 border-top border-secondary">
        <a href="/auth" class="nav-link-custom logout-btn"><i class="bi bi-box-arrow-left"></i> <span>Вийти</span></a>
    </div>
</nav>

<main class="chat-area" id="main-content">
    <header class="d-flex align-items-center p-3 border-bottom border-secondary bg-dark" style="height: 60px;">
        <button id="sidebar-toggle" class="btn text-secondary me-3"><i class="bi bi-layout-sidebar"></i></button>
        <span class="fw-bold text-white">Чат з асистентом</span>
    </header>

    <div class="messages-container" id="messages"></div>

    <div class="input-area">
        <div class="position-relative d-flex gap-2">
            <input type="text" class="form-control custom-input" id="user-input" placeholder="Напишіть повідомлення..." autocomplete="off">
            <button class="btn-send" id="send-btn"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</main>

<!-- АВАТАР ІЗ ПІДСВІТКОЮ -->
<div class="avatar-fixed d-none d-lg-block">
    <video id="avatar-video" autoplay muted loop playsinline>
        <source src="/avatar/animations/speak_blink.mp4" type="video/mp4">
    </video>
    <div class="emotion-label">Стан: <span id="emotion-status" class="emotion-value">Очікування</span></div>
</div>

<script src="/static/js/chat.js"></script>
</body>
</html>
