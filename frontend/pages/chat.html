<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Чат з помічником</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Верхнє меню -->
  <header class="top-nav">
    <nav class="menu-bar">
      <ul>
        <li><a href="index.html">Головна</a></li>
        <li><a href="history.html">Історія чатів</a></li>
      </ul>
    </nav>
    <a href="index.html" class="logout-btn">Вийти</a>
  </header>
  

  <!-- Основна частина -->
  <main class="chat-container">
    <!-- Ліва панель -->
    <aside class="left-panel">
      <img src="avatar.png" alt="Аватар" class="avatar-img" />
      <div class="assistant-message">
        <p>Привіт! Чим можу допомогти?</p>
      </div>
    </aside>

    <!-- Права панель -->
    <section class="right-panel">
      <div class="chat-window">
        <!-- Повідомлення чату -->
        <div class="chat-message assistant">Вітаю! Як я можу вам допомогти?</div>
        <!-- Тут буде більше повідомлень динамічно -->
      </div>

      <!-- Введення повідомлення -->
      <div class="chat-input">
        <input type="text" placeholder="Введіть повідомлення..." />
        <button>🎤</button> <!-- Кнопка для голосу -->
        <button>📩</button> <!-- Кнопка надсилання -->
      </div>
    </section>
  </main>
</body>
</html>
