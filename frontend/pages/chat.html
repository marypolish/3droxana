<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>Чат з помічником</title>
  <link rel="stylesheet" href="/static/css/chat.css" />
</head>
<body>
  <!-- Верхнє меню -->
  <header class="top-nav">
    <nav class="menu-bar">
      <ul>
        <li><a href="/">Головна</a></li>
        <li><a href="/history">Історія чатів</a></li>
      </ul>
    </nav>
    <a href="/" class="logout-btn">Вийти</a>
  </header>
  

  <!-- Основна частина -->
  <main class="chat-container">
    <!-- Ліва панель -->
    <aside class="left-panel">
      <img src="/static/images/avatar.png" alt="Аватар" class="avatar-img" />
      <div class="assistant-message">
        <p>Привіт! Чим можу допомогти?</p>
      </div>
    </aside>

    <!-- Права панель -->
    <section class="right-panel">
      <div class="chat-window">
        <!-- Повідомлення чату -->
        <div class="chat-message assistant">Вітаю! Як я можу вам допомогти?</div>
        <!-- Тут буде більше повідомлень динамічно -->
      </div>

      <!-- Введення повідомлення -->
      <div class="chat-input">
        <textarea id="user-input" placeholder="Введіть повідомлення..."></textarea>
        <button id="voice-btn">🎤</button>
        <button id="send-btn">📩</button>
      </div>
    </section>
  </main>
</body>
<script>
  document.getElementById("send-btn").addEventListener("click", sendMessage);
  document.getElementById("user-input").addEventListener("keypress", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault(); // Щоб не вставлявся новий рядок
    sendMessage();
  }
  });

  function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (message === "") return;

    const chatWindow = document.querySelector(".chat-window");

    // Додаємо повідомлення користувача
    const userMsg = document.createElement("div");
    userMsg.className = "chat-message user";
    userMsg.textContent = message;
    chatWindow.appendChild(userMsg);

    // (Опціонально) Додаємо відповідь асистента (імітація)
    const assistantMsg = document.createElement("div");
    assistantMsg.className = "chat-message assistant";
    assistantMsg.textContent = "Дякую за повідомлення!"; // можна змінити на динамічне
    chatWindow.appendChild(assistantMsg);

    input.value = "";

    // Прокручуємо вниз чат
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }
   // Очистити localStorage при натисканні на кнопку "Вийти"
  document.querySelector(".logout-btn")?.addEventListener("click", function (e) {
    // Очистити локальне сховище
    localStorage.clear();
    sessionStorage.clear(); // Якщо використовувалось
    // За потреби: показати повідомлення або логування
    console.log("Дані з локального сховища видалено");

    
  });
</script>

</html>
