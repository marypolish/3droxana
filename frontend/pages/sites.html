<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайти КПІ | KPI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .site-card { background-color: var(--sidebar-bg); border: 1px solid #333; transition: 0.2s; height: 100%; }
        .site-card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
    </style>
</head>
<body>

<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex align-items-center gap-2 text-white">
        <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
        <span class="fw-bold">KPI Helper</span>
    </div>

    <div class="px-3">
        <a href="/chat" class="btn btn-new-chat w-100 text-start btn-sm mb-3 text-decoration-none">
            <i class="bi bi-plus-lg me-2"></i> Новий чат
        </a>

        <small class="text-uppercase text-secondary fw-bold mb-2 d-block" style="font-size: 0.7rem;">Навігація</small>
        <div class="d-flex flex-column">
            <a href="/" class="nav-link-custom"><i class="bi bi-house"></i> <span>Головна</span></a>
            <a href="/chat" class="nav-link-custom"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom active"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>

    <div class="mt-auto p-3 border-top border-secondary">
        <a href="/auth" class="nav-link-custom logout-btn"><i class="bi bi-box-arrow-left"></i> <span>Вийти</span></a>
    </div>
</nav>

<main class="chat-area p-4" id="main-content" style="overflow-y: auto;">
    <h2 class="text-white mb-4 fw-bold">Корисні ресурси</h2>
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="sitesGrid"></div>
    <div id="emptyMessage" class="text-center text-secondary mt-5" style="display: none;">Список сайтів порожній.</div>
</main>

<script>
    const API_URL = "/api/links"; 
    const grid = document.getElementById("sitesGrid");

    async function loadLinks() {
        try {
            const res = await fetch(API_URL);
            const links = await res.json();
            grid.innerHTML = "";
            links.forEach(link => {
                const col = document.createElement("div");
                col.className = "col";
                col.innerHTML = `
                    <div class="card site-card p-4 text-center">
                        <i class="bi bi-browser-chrome mb-3" style="font-size: 2.5rem; color: var(--accent-color);"></i>
                        <h5 class="text-white fw-bold">${link.title}</h5>
                        <p class="text-secondary small flex-grow-1">${link.description || ""}</p>
                        <a href="${link.url}" target="_blank" class="btn btn-primary w-100" style="background-color: var(--accent-color); border: none;">Відвідати <i class="bi bi-box-arrow-up-right ms-2"></i></a>
                    </div>`;
                grid.appendChild(col);
            });
        } catch (e) { console.error(e); }
    }
    loadLinks();
</script>
</body>
</html>
