<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Сайти КПІ</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      .sites-page {
        min-height: 100vh;
        background-color: #1e1e1e;
        padding-top: 100px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .sites-page h1 {
        font-size: 2.5rem;
        color: #fff;
        margin-bottom: 2rem;
        text-align: center;
      }
      .sites-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        width: 90%;
        max-width: 1100px;
      }
      .site-card {
        background-color: #2a2a2a;
        border-radius: 12px;
        padding: 1.5rem;
        text-align: center;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .site-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 12px;
        padding: 2px;
        background: linear-gradient(45deg, #3b82f6, #1abc9c, #a855f7);
        -webkit-mask: linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.4s;
      }
      .site-card:hover::before {
        opacity: 1;
      }
      .site-card h2 {
        color: #fff;
        margin-bottom: 0.8rem;
        font-size: 1.4rem;
      }
      .site-card p {
        color: #ccc;
        font-size: 0.95rem;
        margin-bottom: 1.2rem;
      }
      .site-card a {
        background-color: #2563eb;
        color: white;
        text-decoration: none;
        padding: 0.6rem 1.2rem;
        border-radius: 8px;
        font-weight: 500;
        transition: background-color 0.3s;
      }
      .site-card a:hover {
        background-color: #1e4ed8;
      }
      .empty-message {
        color: #999;
        font-size: 1.1rem;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">Головна</a>
        <a href="chat.html">Чат</a>
        <a href="sites.html" style="color: #fff">Сайти КПІ</a>
      </nav>
      <a href="/" class="login-btn-top">Вийти</a>
      <!-- <a href="login.html" class="login-btn-top">Увійти</a> -->
    </header>
    <main class="sites-page">
      <h1>Корисні сайти КПІ</h1>
      <div class="sites-grid" id="sitesGrid"></div>
      <p class="empty-message" id="emptyMessage" style="display: none">
        Немає доступних посилань.
      </p>
    </main>
    <script src="/static/js/sites.js"></script>
  </body>
</html>
