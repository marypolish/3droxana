<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Головна — Асистент</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css"> <!-- Використовуємо той самий CSS для кольорів -->

  <style>
      .hero-section {
          height: 100vh;
          display: flex;
          align-items: center;
          background: radial-gradient(circle at top right, #2a1a4a 0%, var(--bg-color) 60%);
      }
      .hero-title {
          font-size: 3.5rem;
          font-weight: 700;
          background: linear-gradient(90deg, #fff, #a78bfa);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
      }
      .hero-img {
          max-height: 80vh;
          filter: drop-shadow(0 0 30px rgba(138, 79, 255, 0.3));
      }
  </style>
</head>
<body>

  <!-- Навігація -->
  <nav class="navbar navbar-expand-lg fixed-top px-4 py-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-white" href="#">KPI Assistant</a>
      <div class="ms-auto">
        <a href="/auth" class="btn btn-primary px-4 rounded-pill fw-bold" style="background-color: var(--accent-color); border: none;">Увійти</a>
      </div>
    </div>
  </nav>

  <!-- Головний блок -->
  <main class="hero-section">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-lg-6 text-center text-lg-start">
          <h1 class="hero-title mb-3">Твій розумний<br>асистент у КПІ</h1>
          <p class="lead text-secondary mb-5">
             Допомога з розкладом, дедлайнами та пошуком інформації. 
             Просто запитай аватара.
          </p>
          <div class="d-flex gap-3 justify-content-center justify-content-lg-start">
            <a href="/auth" class="btn btn-lg btn-light rounded-pill px-5">Почати</a>
            <a href="/sites" class="btn btn-lg btn-outline-secondary rounded-pill px-5">Сайти</a>
          </div>
        </div>
        <div class="col-lg-6 text-center mt-5 mt-lg-0">
            <!-- Використовуємо картинку аватара -->
            <img src="/static/images/avatar.png" alt="3D Avatar" class="img-fluid hero-img">
        </div>
      </div>
    </div>
  </main>

</body>
</html>
