<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історія | KPI Assistant</title>
    <script>
        (function() {
            if (!localStorage.getItem("user")) window.location.href = "/auth";
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { display: flex; height: 100vh; background-color: var(--bg-color); margin: 0; }
        .history-content { flex-grow: 1; margin-left: 280px; height: 100vh; display: flex; flex-direction: column; padding: 40px; overflow: hidden; }
        .history-list-scroll { flex-grow: 1; overflow-y: auto; margin-top: 30px; padding-right: 10px; }
        .chat-card { background-color: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; color: inherit; text-decoration: none; }
        .chat-card:hover { border-color: var(--accent-color); background-color: rgba(138, 79, 255, 0.05); transform: translateX(5px); }
        @media (max-width: 768px) { .history-content { margin-left: 0; } }
    </style>
</head>
<body data-theme="dark">

<nav class="sidebar" id="sidebar">
    <div class="p-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2"><i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i><span class="fw-bold">KPI Helper</span></div>
        <div id="theme-toggle" class="theme-switch-btn"><i class="bi bi-moon-stars-fill" id="theme-icon"></i></div>
    </div>
    <div class="px-3">
        <a href="/chat" class="btn btn-new-chat w-100 text-start btn-sm mb-3 text-decoration-none"><i class="bi bi-plus-lg me-2"></i> Новий чат</a>
        <div class="d-flex flex-column">
            <a href="/chat" class="nav-link-custom"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
            <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
            <a href="/history" class="nav-link-custom active"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
        </div>
    </div>
    <div class="mt-auto p-3 border-top border-secondary">
        <a href="#" class="nav-link-custom" data-bs-toggle="modal" data-bs-target="#logoutModal"><i class="bi bi-box-arrow-left"></i> <span>Вийти</span></a>
    </div>
</nav>

<main class="history-content">
    <div class="d-flex justify-content-between align-items-center">
        <h1 class="fw-bold m-0">Історія розмов</h1>
        <div class="text-secondary small" id="chatCount"></div>
    </div>
    <div class="history-list-scroll" id="historyContent"><div class="text-center mt-5"><div class="spinner-border text-primary"></div></div></div>
</main>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background-color: var(--sidebar-bg); border: 1px solid var(--border-color); color: var(--text-primary);">
      <div class="modal-header border-secondary"><h5>Вихід</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">Бажаєте вийти з акаунту?</div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Ні</button>
        <button type="button" class="btn btn-danger" id="confirmLogout">Так, вийти</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function applyTheme(t) {
        document.body.setAttribute("data-theme", t); localStorage.setItem("theme", t);
        const i = document.getElementById("theme-icon"); if (i) i.className = t === "light" ? "bi bi-sun-fill" : "bi bi-moon-stars-fill";
    }
    document.addEventListener("DOMContentLoaded", () => {
        applyTheme(localStorage.getItem("theme") || "dark");
        document.getElementById("theme-toggle")?.addEventListener("click", () => applyTheme(document.body.getAttribute("data-theme") === "dark" ? "light" : "dark"));
        document.getElementById("confirmLogout")?.addEventListener("click", () => { localStorage.clear(); window.location.href = "/"; });
        fetchHistory();
    });
    async function fetchHistory() {
        const c = document.getElementById('historyContent');
        try {
            const u = JSON.parse(localStorage.getItem("user")), res = await fetch(`/api/sessions/user/${u?._id?.$oid || u?._id}`);
            const d = await res.json(); c.innerHTML = '';
            if (d.length) {
                document.getElementById('chatCount').textContent = `Діалогів: ${d.length}`;
                d.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).forEach(s => {
                    const card = document.createElement('div'); card.className = 'chat-card';
                    card.innerHTML = `<div><h5 class="fw-bold mb-1">${s.name || 'Чат'}</h5><span class="text-secondary small">${new Date(s.updatedAt).toLocaleString()}</span></div><i class="bi bi-chevron-right text-secondary"></i>`;
                    card.onclick = () => { localStorage.setItem("sessionId", s._id?.$oid || s._id); window.location.href = "/chat"; };
                    c.appendChild(card);
                });
            } else c.innerHTML = '<div class="text-center text-secondary mt-5">Порожньо</div>';
        } catch (e) { c.innerHTML = 'Помилка'; }
    }
</script>
</body>
</html>
