<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Історія чатів</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/chat">Створити чат</a>
      <a href="/">Головна</a>
    <a href="/" class="login-btn-top">Вийти</a>
  </header>

  <main class="history-container">
    <div class="history-header">
      <img src="/static/images/avatar1.png" alt="Аватар користувача">
      <h2>Історія чатів</h2>
    </div>

    <ul class="chat-list" id="chatList">
      <!-- Приклад чату:
      <li class="chat-item">
        <div>Допомога з тестом</div>
        <div class="chat-time">3 години тому</div>
      </li>
      -->
    </ul>

    <div class="empty-message" id="emptyMessage">
      тут поки, що порожньо
    </div>
  </main>

  <script>
async function loadChats() {
      try {
        const user = JSON.parse(localStorage.getItem("user"));
        const userId = user?._id?.$oid || user?._id || null;

        if (!userId) {
          document.getElementById('emptyMessage').textContent = "Будь ласка, увійдіть у систему.";
          document.getElementById('emptyMessage').style.display = 'block';
          return;
        }

        const response = await fetch(`/api/sessions/user/${userId}`);
        if (!response.ok) throw new Error(`HTTP помилка: ${response.status}`);

        const chats = await response.json();

        const chatList = document.getElementById('chatList');
        const emptyMessage = document.getElementById('emptyMessage');
        chatList.innerHTML = ''; // Очистити список

        if (!chats || chats.length === 0) {
          emptyMessage.style.display = 'block';
        } else {
          emptyMessage.style.display = 'none';

          chats.forEach(chat => {
            const sessionId = chat._id?.$oid || chat._id;
            const li = document.createElement('li');
            li.className = 'chat-item';

            // Створюємо посилання, яке при кліку збереже sessionId і перейде
            const a = document.createElement('a');
            a.href = '#';
            a.innerHTML = `
              <div>${chat.name || 'Без назви'}</div>
              <div class="chat-time">${new Date(chat.updatedAt).toLocaleString()}</div>
            `;

            a.addEventListener('click', (e) => {
              e.preventDefault();
              localStorage.setItem("sessionId", sessionId);
              window.location.href = "/chat";
            });

            li.appendChild(a);
            chatList.appendChild(li);
          });
        }
      } catch (error) {
        console.error("Помилка завантаження чатів:", error);
        const emptyMessage = document.getElementById('emptyMessage');
        emptyMessage.textContent = "Помилка завантаження історії чатів.";
        emptyMessage.style.display = 'block';
      }
    }

    loadChats();
</script>


</body>
</html>
