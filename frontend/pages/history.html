<!DOCTYPE html>
<html lang="uk" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історія чатів | KPI Assistant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        /* Виправляємо накладання та сітку */
        body {
            display: flex;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
        }

        /* Контентна область праворуч від меню */
        .history-container-fixed {
            flex-grow: 1;
            margin-left: 280px; /* Тільки якщо меню не collapsed */
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow: hidden;
        }

        /* Область скролу */
        .history-list-scroll {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 30px;
            padding-right: 10px;
        }

        /* Стильні картки (компактні) */
        .chat-card {
            background-color: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
        }

        .chat-card:hover {
            border-color: var(--accent-color);
            background-color: rgba(138, 79, 255, 0.05);
            transform: translateX(5px);
        }

        .chat-info h5 {
            margin: 0 0 5px 0;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chat-info span {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .chat-icon-arrow {
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        /* Якщо меню сховане (collapsed) */
        .sidebar.collapsed + .history-container-fixed {
            margin-left: 0;
        }

        /* Стилізація скролбару */
        .history-list-scroll::-webkit-scrollbar { width: 6px; }
        .history-list-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- 1. САЙДБАР (Меню - копія з чату) -->
    <nav class="sidebar" id="sidebar">
        <div class="p-3 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2 text-white">
                <i class="bi bi-robot fs-4" style="color: var(--accent-color);"></i>
                <span class="fw-bold">KPI Helper</span>
            </div>
        </div>

        <div class="px-3">
            <a href="/chat" class="btn btn-new-chat w-100 text-start btn-sm mb-3 text-decoration-none text-white">
                <i class="bi bi-plus-lg me-2"></i> Новий чат
            </a>

            <small class="text-uppercase text-secondary fw-bold mb-2 d-block" style="font-size: 0.7rem;">Навігація</small>
            <div class="d-flex flex-column">
                <a href="/" class="nav-link-custom"><i class="bi bi-house"></i> <span>Головна</span></a>
                <a href="/chat" class="nav-link-custom"><i class="bi bi-chat-dots"></i> <span>Чат</span></a>
                <a href="/sites" class="nav-link-custom"><i class="bi bi-globe"></i> <span>Сайти КПІ</span></a>
                <a href="/history" class="nav-link-custom active"><i class="bi bi-clock-history"></i> <span>Історія</span></a>
            </div>
        </div>

        <div class="mt-auto p-3 border-top border-secondary">
            <a href="/auth" class="nav-link-custom logout-btn"><i class="bi bi-box-arrow-left"></i> <span>Вийти</span></a>
        </div>
    </nav>

    <!-- 2. ОСНОВНИЙ КОНТЕНТ -->
    <main class="history-container-fixed">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="text-white fw-bold m-0">Історія розмов</h1>
            <div class="text-secondary small" id="chatCount"></div>
        </div>

        <div class="history-list-scroll" id="historyContent">
            <!-- Сюди завантажується список -->
            <div class="text-center mt-5"><div class="spinner-border text-primary"></div></div>
        </div>

        <div id="noChats" class="text-center text-secondary mt-5" style="display: none;">
            <i class="bi bi-chat-square-dots fs-1 d-block mb-3"></i>
            Поки що тут порожньо
        </div>
    </main>

<script>
async function fetchHistory() {
    const historyContent = document.getElementById('historyContent');
    const noChats = document.getElementById('noChats');
    const chatCount = document.getElementById('chatCount');

    try {
        const user = JSON.parse(localStorage.getItem("user"));
        const userId = user?._id?.$oid || user?._id || null;

        if (!userId) { window.location.href = "/auth"; return; }

        const response = await fetch(`/api/sessions/user/${userId}`);
        const data = await response.json();

        historyContent.innerHTML = '';

        if (!data || data.length === 0) {
            noChats.style.display = 'block';
            return;
        }

        chatCount.textContent = `Всього діалогів: ${data.length}`;

        // Сортування: нові зверху
        data.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));

        data.forEach(session => {
            const sid = session._id?.$oid || session._id;
            const date = new Date(session.updatedAt).toLocaleString('uk-UA', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            const card = document.createElement('div');
            card.className = 'chat-card';
            card.innerHTML = `
                <div class="chat-info">
                    <h5>${session.name || 'Без назви'}</h5>
                    <span><i class="bi bi-calendar3 me-1"></i> ${date}</span>
                </div>
                <div class="chat-icon-arrow">
                    <i class="bi bi-chevron-right"></i>
                </div>
            `;

            card.onclick = () => {
                localStorage.setItem("sessionId", sid);
                window.location.href = "/chat";
            };

            historyContent.appendChild(card);
        });

    } catch (e) {
        historyContent.innerHTML = '<p class="text-danger text-center">Помилка завантаження даних</p>';
    }
}

document.addEventListener("DOMContentLoaded", fetchHistory);

// Вихід
document.querySelector(".logout-btn")?.addEventListener("click", () => {
    localStorage.clear();
});
</script>

</body>
</html>
