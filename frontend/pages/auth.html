<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Аутентифікація</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <img src="/static/images/avatar1.png" alt="Аватар" class="avatar-img" />

    <h2 id="form-title">Вхід</h2>

    <!-- Вхід -->
    <form class="auth-form" id="signin-form">
      <input type="email" placeholder="Електронна пошта" required />
      <input type="password" placeholder="Пароль" required />
      <label class="remember">
        <input type="checkbox" />
        Запам'ятати мене
      </label>
      <button type="submit">Увійти</button>
    </form>

    <!-- Реєстрація -->
    <form class="auth-form hidden" id="signup-form">
      <input type="text" placeholder="Ім'я користувача" required />
      <input type="email" placeholder="Електронна пошта" required />
      <input type="password" placeholder="Пароль" required />
      <input type="password" placeholder="Підтвердіть пароль" required />
      <button type="submit">Зареєструватися</button>
    </form>

    <p class="switch-text" id="toggle-text">
      Ще не маєте облікового запису? <a href="#" id="toggle-link">Зареєструватися</a>
    </p>
  </div>

  <script>
    const toggleLink = document.getElementById('toggle-link');
    const toggleText = document.getElementById('toggle-text');
    const title = document.getElementById('form-title');
    const signInForm = document.getElementById('signin-form');
    const signUpForm = document.getElementById('signup-form');

    toggleLink.addEventListener('click', function switchForm(e) {
      e.preventDefault();
      const isLogin = !signInForm.classList.contains('hidden');
      signInForm.classList.toggle('hidden');
      signUpForm.classList.toggle('hidden');
      title.textContent = isLogin ? 'Реєстрація' : 'Вхід';
      toggleText.innerHTML = isLogin
        ? 'Вже маєте обліковий запис? <a href="#" id="toggle-link">Увійти</a>'
        : 'Ще не маєте облікового запису? <a href="#" id="toggle-link">Зареєструватися</a>';
      document.getElementById('toggle-link').addEventListener('click', switchForm);
    });
  </script>
</body>
</html>
