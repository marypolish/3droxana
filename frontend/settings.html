<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Налаштування | KPI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">
  <nav class="nav-bar">
    <div class="logo">KPI<span>Assistant</span></div>
    <div class="nav-links">
      <a href="index.html">Головна</a>
      <a href="chat.html">Чат</a>
      <a href="about.html">Про</a>
      <a href="settings.html">Налаштування</a>
    </div>
  </nav>

  <main class="content-main">
    <h1>Налаштування</h1>

    <form class="settings-form">
      <label for="language">Мова інтерфейсу:</label>
      <select id="language">
        <option>Українська</option>
        <option>English</option>
      </select>

      <label for="voice">Озвучка бота:</label>
      <select id="voice">
        <option>Чоловічий голос</option>
        <option>Жіночий голос</option>
      </select>

      <label>
        <input type="checkbox" id="notifications" checked />
        Увімкнути нагадування
      </label>

      <button type="submit" class="primary-btn">Зберегти зміни</button>
    </form>
  </main>
</body>
</html>
