<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Аутентифікація</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <img src="./avatar1.png" alt="Аватар" class="avatar-img" />

    <h2 id="form-title">Sign In</h2>

    <!-- Sign In -->
    <form class="auth-form" id="signin-form">
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <label class="remember">
        <input type="checkbox" />
        Remember me
      </label>
      <button type="submit">Sign in</button>
    </form>

    <!-- Sign Up -->
    <form class="auth-form hidden" id="signup-form">
      <input type="text" placeholder="Username" required />
      <input type="email" placeholder="Email" required />
      <input type="password" placeholder="Password" required />
      <input type="password" placeholder="Confirm Password" required />
      <button type="submit">Sign up</button>
    </form>

    <p class="switch-text" id="toggle-text">
      Don’t have an account? <a href="#" id="toggle-link">Sign up</a>
    </p>
  </div>

  <script>
    const toggleLink = document.getElementById('toggle-link');
    const toggleText = document.getElementById('toggle-text');
    const title = document.getElementById('form-title');
    const signInForm = document.getElementById('signin-form');
    const signUpForm = document.getElementById('signup-form');

    toggleLink.addEventListener('click', function switchForm(e) {
      e.preventDefault();
      const isLogin = !signInForm.classList.contains('hidden');
      signInForm.classList.toggle('hidden');
      signUpForm.classList.toggle('hidden');
      title.textContent = isLogin ? 'Sign Up' : 'Sign In';
      toggleText.innerHTML = isLogin
        ? 'Already have an account? <a href="#" id="toggle-link">Sign in</a>'
        : 'Don’t have an account? <a href="#" id="toggle-link">Sign up</a>';
      document.getElementById('toggle-link').addEventListener('click', switchForm);
    });
  </script>
</body>
</html>
